services:
  - type: web
    name: mexagent-backend
    runtime: python
    rootDir: backend
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: ACTION_DELAY_MS
        value: "2500"
      - key: DEFAULT_DEPTH
        value: "2"
      - key: APPIUM_URL
        value: "http://not-configured-yet"
      - key: GROQ_API_KEY
        sync: false
      - key: CONFIGURE_SECRET
        sync: false
